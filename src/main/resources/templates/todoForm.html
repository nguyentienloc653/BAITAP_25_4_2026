<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Them cong viec</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --line: #dbe3ee;
            --primary: #0f766e;
            --primary-hover: #115e59;
            --error: #dc2626;
            --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            max-width: 760px;
            margin: 0 auto;
            padding: 40px 20px;
            line-height: 1.5;
            color: var(--text);
            background: linear-gradient(180deg, #eef6ff 0%, var(--bg) 100%);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 30px;
        }

        form {
            display: grid;
            gap: 18px;
        }

        input, select, button {
            padding: 12px 14px;
            font-size: 15px;
            border-radius: 12px;
            border: 1px solid var(--line);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
        }

        .error {
            color: var(--error);
            font-size: 13px;
            margin-top: 4px;
        }

        a {
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
        }

        .page {
            background: var(--surface);
            border: 1px solid rgba(219, 227, 238, 0.7);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 28px;
        }

        .subtitle {
            margin: 0 0 24px;
            color: var(--muted);
        }

        .field {
            display: grid;
            gap: 8px;
        }

        label {
            font-weight: 600;
        }

        button {
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .page {
                padding: 20px;
                border-radius: 18px;
            }

            h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
<div class="page">
    <h1 th:text="${todo.id != null ? 'Cap nhat cong viec' : 'Them cong viec'}">Them cong viec</h1>
    <p class="subtitle">Nhap thong tin cong viec, han xu ly va muc uu tien de theo doi de hon.</p>

    <form th:action="${todo.id != null} ? @{/edit-todo/{id}(id=${todo.id})} : @{/add-todo}" th:object="${todo}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="field">
            <label for="content">Noi dung</label>
            <input id="content" type="text" th:field="*{content}" placeholder="Nhap noi dung cong viec">
            <p class="error" th:errors="*{content}"></p>
        </div>

        <div class="field">
            <label for="dueDate">Han hoan thanh</label>
            <input id="dueDate" type="date" th:field="*{dueDate}">
            <p class="error" th:errors="*{dueDate}"></p>
        </div>

        <div class="field">
            <label for="status">Trang thai</label>
            <select id="status" th:field="*{status}">
                <option value="">Chon trang thai</option>
                <option value="PENDING">PENDING</option>
                <option value="DONE">DONE</option>
            </select>
            <p class="error" th:errors="*{status}"></p>
        </div>

        <div class="field">
            <label for="priority">Do uu tien</label>
            <select id="priority" th:field="*{priority}">
                <option value="">Chọn mức độ ưu tiên</option>
                <option value="LOW">LOW</option>
                <option value="MEDIUM">MEDIUM</option>
                <option value="HIGH">HIGH</option>
            </select>
            <p class="error" th:errors="*{priority}"></p>
        </div>

        <button type="submit" th:text="${todo.id != null ? 'Cap nhat' : 'Luu'}">Luu</button>
    </form>

    <a class="back-link" th:href="@{/todos}">Quay lại danh sách</a>
</div>
</body>
</html>
